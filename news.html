<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Latest AI news and articles aggregated from top sources.">
    <meta name="keywords" content="AI news, artificial intelligence, machine learning, latest AI">
    <meta name="author" content="Green Wick AI">
    <meta name="robots" content="index, follow">
    <title>AI News Feed</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div style="width:100%;padding:6px 12px;background:linear-gradient(90deg,#0d9488,#065f46);font-family:sans-serif;box-sizing:border-box;">
      <div style="max-width:720px;margin:0 auto;">
        <div style="text-align:center;margin-bottom:4px;">
          <a href="https://crypto.wick.pics" style="font-size:13px;font-weight:500;letter-spacing:0.3px;color:#d1fae5;text-decoration:none;"><span style="opacity:0.75">Powered by</span> <b>Green Wick</b> <span style="opacity:0.75">Cryptocurrency</span></a>
        </div>
        <div style="display:flex;align-items:center;justify-content:center;gap:12px;">
          <a href="https://wick.pics" style="display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:8px;font-size:12px;font-weight:600;white-space:nowrap;background:rgba(255,255,255,0.12);color:#d1fae5;text-decoration:none;">&larr; Back to WICK Agent Hub</a>
          <a href="https://greenwick.tiiny.site/#join" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:8px;font-size:12px;font-weight:700;white-space:nowrap;background:rgba(255,255,255,0.18);color:#ecfdf5;text-decoration:none;">Buy $WICK &rarr;</a>
        </div>
      </div>
    </div>
    <div class="container">
        <a href="https://wick.pics" class="back-link" style="color: #39ff14;">&larr; Home</a>
        <a href="/" class="back-link">&larr; Back to AI Tools</a>

        <header class="mission">
            <h1>AI News Feed</h1>
            <p>Latest AI agent news and agentic AI developments</p>
        </header>

        <section class="news-section">
            <h2>Recent Articles</h2>
            <div class="news-grid" id="news-container">
                <div class="news-item">
                    <h3>Loading News...</h3>
                    <p>Fetching the latest articles</p>
                </div>
            </div>
        </section>

        <footer class="donation">
            <p>AI News Aggregation Service</p>
        </footer>
    </div>

    <script>
        var RSS_FEEDS = [
            'https://www.marktechpost.com/feed/',
            'https://techcrunch.com/category/artificial-intelligence/feed/',
            'https://www.technologyreview.com/feed/',
            'https://the-decoder.com/feed/',
            'https://venturebeat.com/category/ai/feed/'
        ];

        var API_BASE = 'https://api.rss2json.com/v1/api.json?rss_url=';

        // Keywords that indicate an article is about AI agents / agentic AI
        var AGENT_KEYWORDS = [
            // Core agent terms
            'agent', 'agentic', 'autonomous', 'multi-agent', 'multiagent',
            'ai agent', 'ai assistant', 'virtual assistant', 'copilot',
            // Frameworks & tools
            'langchain', 'langgraph', 'crewai', 'autogen', 'autogpt', 'auto-gpt',
            'babyagi', 'metagpt', 'camel-ai', 'superagi', 'agentgpt',
            'semantic kernel', 'haystack', 'llamaindex', 'llama-index',
            'opendevin', 'openhands', 'swe-agent', 'swe-bench',
            'phidata', 'composio', 'e2b', 'toolhouse',
            'claude code', 'cursor', 'windsurf', 'cline', 'roo code',
            'devin', 'cognition', 'factory ai', 'codegen',
            // Protocols & standards
            'mcp', 'model context protocol', 'function calling', 'tool use',
            'tool calling', 'json mode', 'structured output',
            'a2a', 'agent-to-agent', 'agent protocol', 'agent card',
            // Concepts & architecture
            'orchestration', 'workflow', 'pipeline', 'planner', 'planning',
            'chain of thought', 'chain-of-thought', 'cot', 'reasoning',
            'react pattern', 'react agent', 'reflection', 'self-correct',
            'retrieval augmented', 'rag', 'memory system', 'vector store',
            'embeddings', 'tool augmented', 'grounding',
            'swarm', 'swarm intelligence', 'task decomposition',
            'human-in-the-loop', 'human in the loop', 'hitl',
            'scaffold', 'scaffolding', 'prompt chaining',
            // Capabilities
            'web browsing', 'code execution', 'code interpreter',
            'computer use', 'screen control', 'browser agent',
            'coding agent', 'coding assistant', 'code agent',
            'research agent', 'data agent', 'sales agent',
            'customer support agent', 'support agent',
            // Industry terms
            'robotic process', 'rpa', 'digital worker', 'digital employee',
            'ai workforce', 'ai worker', 'task automation',
            'no-code agent', 'low-code agent', 'agent builder',
            'agent platform', 'agent marketplace', 'agent store',
            // Safety & evaluation
            'agent safety', 'agent alignment', 'agent eval',
            'agent benchmark', 'red teaming agent', 'guardrail'
        ];

        function isAgentRelated(item) {
            var text = ((item.title || '') + ' ' + (item.description || '')).toLowerCase();
            for (var i = 0; i < AGENT_KEYWORDS.length; i++) {
                if (text.indexOf(AGENT_KEYWORDS[i]) !== -1) return true;
            }
            return false;
        }

        function fetchFeed(url) {
            return fetch(API_BASE + encodeURIComponent(url))
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (!data.items) return [];
                    return data.items.map(function(item) {
                        var source = '';
                        try { source = new URL(item.link).hostname.replace('www.', ''); } catch(e) {}
                        item._source = source;
                        return item;
                    });
                })
                .catch(function() { return []; });
        }

        function renderArticles(container, items, heading) {
            if (heading) {
                var h = document.createElement('h3');
                h.textContent = heading;
                h.style.cssText = 'color: #888; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; margin: 30px 0 15px; padding-bottom: 8px; border-bottom: 1px solid #333;';
                container.appendChild(h);
            }
            items.forEach(function(item) {
                var newsItem = document.createElement('div');
                newsItem.className = 'news-item';

                var title = document.createElement('h3');
                title.textContent = item.title;

                var meta = document.createElement('p');
                meta.className = 'date';
                var dateStr = new Date(item.pubDate).toLocaleDateString();
                meta.textContent = item._source ? dateStr + ' · ' + item._source : dateStr;

                var description = document.createElement('p');
                var cleanDesc = item.description.replace(/<[^>]*>/g, '');
                var firstSentence = cleanDesc.split('.')[0];
                description.textContent = firstSentence.length > 150
                    ? firstSentence.substring(0, 150) + '...'
                    : firstSentence + '.';

                var link = document.createElement('a');
                link.href = item.link;
                link.textContent = 'Read more';
                link.target = '_blank';
                link.rel = 'noopener noreferrer';

                newsItem.appendChild(title);
                newsItem.appendChild(meta);
                newsItem.appendChild(description);
                newsItem.appendChild(link);

                container.appendChild(newsItem);
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            Promise.all(RSS_FEEDS.map(fetchFeed))
                .then(function(results) {
                    var allItems = [];
                    results.forEach(function(items) {
                        allItems = allItems.concat(items);
                    });

                    // Sort by date, newest first
                    allItems.sort(function(a, b) {
                        return new Date(b.pubDate) - new Date(a.pubDate);
                    });

                    // Split into agent-related and general
                    var agentItems = [];
                    var generalItems = [];
                    allItems.forEach(function(item) {
                        if (isAgentRelated(item)) {
                            agentItems.push(item);
                        } else {
                            generalItems.push(item);
                        }
                    });

                    var container = document.getElementById('news-container');
                    container.innerHTML = '';

                    if (agentItems.length === 0 && generalItems.length === 0) {
                        container.innerHTML =
                            '<div class="news-item">' +
                            '<h3>No Articles Found</h3>' +
                            '<p>Could not fetch articles. Please try again later.</p>' +
                            '</div>';
                        return;
                    }

                    // Always show agent articles first
                    if (agentItems.length > 0) {
                        renderArticles(container, agentItems.slice(0, 20), null);
                    }

                    // If fewer than 3 agent articles, show general AI as fallback
                    if (agentItems.length < 3 && generalItems.length > 0) {
                        renderArticles(container, generalItems.slice(0, 15), 'More AI News');
                    }
                })
                .catch(function() {
                    document.getElementById('news-container').innerHTML =
                        '<div class="news-item">' +
                        '<h3>Error Loading News</h3>' +
                        '<p>Could not fetch articles. Please try again later.</p>' +
                        '</div>';
                });
        });
    </script>
</body>
</html>
